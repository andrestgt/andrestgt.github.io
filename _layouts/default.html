  <meta charset="UTF-8">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

  <style>
    :root{
      --accent: #1a4fd8;
      --text-primary: #1a1a1a;
      --text-muted: #666;
      --rule: #e5e5e5;
      --content-max: 820px;
      --travelogue-max: 720px;
      --hero-mobile-height: 56vh;
      --hero-desktop-height: 100vh;
      --hero-overlay: rgba(0,0,0,0.35);
      --read-full-blue: #1a4fd8;
    }

    html,body { height: 100%; }

    /* ---------------------------
       GLOBAL BASE
       --------------------------- */

    body {
      font-family: "Source Serif 4", Georgia, serif;
      max-width: var(--content-max);
      margin: 3rem auto;
      padding: 0 1.5rem;
      line-height: 1.7;
      background: #fff;
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    h1,h2,h3 { font-family: "Inter", system-ui, sans-serif; margin: 0 0 .6rem 0; }
    h1 { border-bottom: 2px solid var(--rule); padding-bottom: .4rem; margin-bottom: 1.2rem; }

    p { margin: 1.2rem 0; }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    img { max-width: 100%; height: auto; display: block; margin: 1.5rem auto; border-radius: 6px; }

    figure { margin: 1.5rem auto; text-align: center; }
    figcaption { font-size: .85rem; color: var(--text-muted); margin-top: .4rem; }

    nav.site-nav {
      border-bottom: 1px solid var(--rule);
      padding: .6rem 0 .8rem;
      margin-bottom: 2.5rem;
      text-align: right;
      position: relative;
      z-index: 30;
      background: transparent;
    }

    nav.site-nav a {
      font-family: "Inter", system-ui, sans-serif;
      font-size: .95rem;
      margin-left: 1rem;
      color: #333;
    }

    main#top {
      max-width: var(--content-max);
      margin: 0 auto;
      padding: 1rem 0 4rem;
      position: relative;
      z-index: 40;
      background: transparent;
    }

    hr { border: none; height: 1px; background: var(--rule); margin: 1.2rem 0; }

    /* ---------------------------
       TRAVELOGUE-SPECIFIC TYPOGRAPHY
       --------------------------- */

    /* ---------------------------
       TRAVELOGUE TYPOGRAPHY
       --------------------------- */

    body.travels {
      font-family: "Lora", Georgia, serif;
      max-width: var(--travelogue-max);
      line-height: 1.85;
      font-size: 1.0625rem;
      color: #1a1a1a;
    }

    /* Main title */
    body.travels .page-body h1 {
      font-family: "Inter", sans-serif;
      font-weight: 700;
      font-size: 2.6rem;
      line-height: 1.1;
      letter-spacing: -0.03em;
      border: none;
      padding: 0;
      margin-bottom: 0.25rem;
      color: #111;
    }

    /* Date headings */
    body.travels .page-body h2 {
      font-family: "Inter", sans-serif;
      font-weight: 700;
      font-size: 1.0625rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #111;
      margin-top: 4rem;
      margin-bottom: 1.5rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid #ebebeb;
    }

    /* Location subheadings — elegant italic serif */
    body.travels .page-body h3 {
      font-family: "Lora", Georgia, serif;
      font-weight: 400;
      font-style: italic;
      font-size: 1.1rem;
      color: #555;
      margin-top: 0.5rem;
      margin-bottom: 1rem;
      border: none;
    }

    /* Body paragraphs */
    body.travels .page-body p {
      font-size: 1.0625rem;
      line-height: 1.85;
      margin: 1.5rem 0;
      color: #1a1a1a;
    }

    /* Section dividers — short centred rule */
    body.travels .page-body hr {
      margin: 3.5rem auto;
      width: 3rem;
      height: 2px;
      background: #ccc;
      border: none;
      display: block;
    }

    /* Photo captions — small grey label */
    body.travels .page-body em {
      font-family: "Inter", sans-serif;
      font-style: normal;
      font-size: 0.8rem;
      letter-spacing: 0.03em;
      color: #aaa;
      display: block;
      text-align: center;
      margin-top: -0.5rem;
      margin-bottom: 2.5rem;
    }

    /* Images */
    body.travels .page-body img {
      margin: 2.5rem auto 0.75rem;
      border-radius: 4px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.1);
      width: 100%;
    }

    /* ---------------------------
       HERO / BACKGROUND
       --------------------------- */

    .site-hero {
      position: relative;
      left: 50%;
      right: 50%;
      margin-left: -50vw;
      margin-right: -50vw;
      width: 100vw;
      min-height: var(--hero-mobile-height);
      display: flex;
      align-items: center;
      justify-content: flex-start;
      box-sizing: border-box;
      overflow: hidden;
      color: #fff;
      background-color: #000;
      background-position: center center;
      background-repeat: no-repeat;
      background-size: cover;
      background-attachment: scroll;
      z-index: 10;
    }

    .site-hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: var(--hero-overlay);
      pointer-events: none;
      z-index: 5;
    }

    .hero-inner {
      width: 100%;
      max-width: var(--content-max);
      padding: 2.5rem 1.5rem;
      margin: 0 auto;
      position: relative;
      z-index: 10;
      box-sizing: border-box;
    }

    .page-body {
      max-width: var(--content-max);
      margin: 2rem auto;
      padding: 0 1.5rem 4rem;
      background: transparent;
      color: inherit;
      position: relative;
      z-index: 20;
    }

    body.travels .page-body {
      max-width: var(--travelogue-max);
    }

    /* Review pages */
    body.food.food-review {
      background: #fff !important;
      color: var(--text-primary) !important;
      max-width: var(--content-max);
      margin: 3rem auto;
      padding: 0 1.5rem;
    }

    body.food.food-review nav.site-nav {
      position: relative;
      border-bottom: 1px solid var(--rule);
    }

    body.food.food-review nav.site-nav a { color: #333; }

      .page-body p { font-size: 1.1rem; line-height: 1.85; }
      body.travels .page-body p { font-size: 1.1875rem; line-height: 1.85; }
    }

    @media (max-width: 600px) {
      body { margin: 0; padding: 0; }
      .site-hero { min-height: 44vh; left: 50%; right: 50%; margin-left: -50vw; margin-right: -50vw; width: 100vw; }
      .hero-inner { padding: 1.6rem; }
      nav.site-nav { text-align: left; padding: .6rem 1.5rem; position: relative; top: auto; right: auto; }
      main#top { padding-top: 1rem; }
      .page-body { margin: 0.8rem 0 3rem; padding: 0 1.2rem; }
    }

    a.read-full {
      color: var(--read-full-blue) !important;
      font-weight: 600;
      text-decoration: none;
    }
    a.read-full:hover { text-decoration: underline; }

    /* ---------------------------
       LIGHTBOX
       --------------------------- */

    .lightbox-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 1000;
      cursor: zoom-out;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      box-sizing: border-box;
    }

    .lightbox-overlay.active {
      display: flex;
    }

    .lightbox-overlay img {
      max-width: 100%;
      max-height: 90vh;
      object-fit: contain;
      border-radius: 4px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
      cursor: default;
      margin: 0;
      opacity: 1 !important;
      transition: none !important;
    }

    .lightbox-caption {
      position: fixed;
      bottom: 1.5rem;
      left: 0;
      right: 0;
      text-align: center;
      color: rgba(255,255,255,0.6);
      font-family: "Inter", sans-serif;
      font-size: 0.8rem;
      letter-spacing: 0.03em;
      pointer-events: none;
      padding: 0 2rem;
    }

    .lightbox-close {
      position: fixed;
      top: 0;
      right: 0;
      color: rgba(255,255,255,0.8);
      font-family: "Inter", sans-serif;
      font-size: 1.75rem;
      cursor: pointer;
      line-height: 1;
      z-index: 1001;
      padding: 1.25rem 1.5rem;
      /* large tap target for mobile */
      min-width: 3rem;
      min-height: 3rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .lightbox-close:hover { color: #fff; }

    .page-body img {
      cursor: zoom-in;
      transition: opacity 0.15s ease;
    }

    .page-body img:hover { opacity: 0.88; }

  </style>

  {% seo %}
</head>

<body class="
  {{ page.section }}
  {% if page.index %} index{% endif %}
  {% if page.country %} food-country{% endif %}
  {% if page.city %} food-city{% endif %}
  {% if page.city %} {{ page.city }}{% endif %}
  {% if page.category %} food-category{% endif %}
  {% if page.category %} {{ page.category }}{% endif %}
  {% if page.review %} food-review{% endif %}
  {% if page.slug %} {{ page.slug }}{% endif %}
">

  <nav class="site-nav">
    <a href="/">Home</a>
    <a href="/travels/">Travels</a>
    <a href="/food/">Food</a>
    <a href="/about/">About</a>
  </nav>

{% unless page.review or page.section == 'about' %}
<header
  class="site-hero{% unless page.hero_overlay == false %} has-overlay{% endunless %}"
  role="banner"
  aria-label="Page hero"
  {% if page.hero %}
    style="background-image: url('{{ page.hero }}');"
  {% endif %}
>
  <div class="hero-inner">
    {% if page.title %}
      <h1>{{ page.title }}</h1>
    {% endif %}
    {% if page.subtitle %}
      <p class="subtitle">{{ page.subtitle }}</p>
    {% endif %}
  </div>
</header>
{% endunless %}

<main id="top" class="page-body" role="main">
  {{ content }}
</main>

  <!-- LIGHTBOX -->
  <div class="lightbox-overlay" id="lightbox" role="dialog" aria-modal="true">
    <span class="lightbox-close" id="lightbox-close" aria-label="Close">&times;</span>
    <img id="lightbox-img" src="" alt="">
    <p class="lightbox-caption" id="lightbox-caption"></p>
  </div>

  <script>
    (function () {
      // Lightbox
      var overlay = document.getElementById('lightbox');
      var lbImg = document.getElementById('lightbox-img');
      var lbCaption = document.getElementById('lightbox-caption');
      var lbClose = document.getElementById('lightbox-close');

      function openLightbox(src, alt) {
        lbImg.src = src;
        lbCaption.textContent = alt || '';
        overlay.classList.add('active');
        // iOS-compatible scroll lock
        document.body.style.position = 'fixed';
        document.body.style.width = '100%';
        document.body.style.overflow = 'hidden';
      }

      function closeLightbox() {
        overlay.classList.remove('active');
        lbImg.src = '';
        document.body.style.position = '';
        document.body.style.width = '';
        document.body.style.overflow = '';
      }

      // Attach click AND touch to all images in page-body
      var images = document.querySelectorAll('.page-body img');
      images.forEach(function(img) {
        // Make sure image is not inside an <a> tag already
        img.style.cursor = 'zoom-in';

        function handleOpen(e) {
          e.preventDefault();
          e.stopPropagation();
          openLightbox(img.src, img.alt);
        }

        img.addEventListener('click', handleOpen);
        img.addEventListener('touchend', handleOpen, { passive: false });
      });

      // Close on overlay background tap/click
      function handleClose(e) {
        if (e.target === overlay) {
          e.preventDefault();
          closeLightbox();
        }
      }
      overlay.addEventListener('click', handleClose);
      overlay.addEventListener('touchend', handleClose, { passive: false });

      // Close on X button
      function handleCloseBtn(e) {
        e.preventDefault();
        closeLightbox();
      }
      lbClose.addEventListener('click', handleCloseBtn);
      lbClose.addEventListener('touchend', handleCloseBtn, { passive: false });

      // Close on Escape key
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeLightbox();
      });

      // Swipe down to close on mobile
      var touchStartY = 0;
      overlay.addEventListener('touchstart', function(e) {
        touchStartY = e.touches[0].clientY;
      }, { passive: true });

      overlay.addEventListener('touchend', function(e) {
        var deltaY = e.changedTouches[0].clientY - touchStartY;
        if (deltaY > 60) closeLightbox(); // swipe down 60px = close
      }, { passive: true });

    })();
  </script>

  <script>
    (function () {
      var body = document.body;
      if (!body) return;

      var isLanding = body.classList.contains('food-category');
      var isRestaurantsLanding = isLanding && (body.className.indexOf('restaurants') !== -1);
      var isCafesLanding = isLanding && (body.className.indexOf('cafes') !== -1);

      if (!(isRestaurantsLanding || isCafesLanding)) return;

      var anchors = Array.prototype.slice.call(document.querySelectorAll('a'));
      var matches = [
        'read the full review',
        'read full review',
        'read the review',
        'read review',
        'read the full article',
        'read more'
      ];

      anchors.forEach(function(a){
        if (!a || !a.textContent) return;
        var txt = a.textContent.trim().toLowerCase();
        for (var i=0;i<matches.length;i++){
          if (txt === matches[i] || txt.indexOf(matches[i]) !== -1) {
            a.classList.add('read-full');
            break;
          }
        }
      });
    })();
  </script>

</body>
</html>
